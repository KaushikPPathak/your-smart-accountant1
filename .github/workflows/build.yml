name: Build Windows Installers

# Builds Tauri Windows installers (NSIS .exe + WiX .msi).
# Runs daily, on-demand, or when a version tag is pushed.
on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (stable + MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read app version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build Tauri (NSIS .exe + WiX .msi)
        run: bunx tauri build --bundles nsis msi

      - name: Upload NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: SmartAccountant-Windows-NSIS-${{ steps.ver.outputs.version }}
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Upload MSI installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: SmartAccountant-Windows-MSI-${{ steps.ver.outputs.version }}
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Attach installers to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi
