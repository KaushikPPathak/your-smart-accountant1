name: Build Desktop & Mobile

# Runs on:
#  - once a day (06:00 UTC)       → daily artifacts (downloadable ~90 days)
#  - every push to main            → produces the newest installable desktop build
#  - every pull request            → verifies build stays green
#  - manual dispatch (Actions tab) → same as above
#  - version tags (v1.2.3)         → additionally publishes a public GitHub Release
on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Reliability gate — runs before any bundle work. Green here means the
  # install → data → profile-orphan → restore round-trip still preserves
  # every voucher. Blocks the pipeline on regression. See
  # src/test/restore-roundtrip.test.ts.
  # ─────────────────────────────────────────────
  test:
    name: Reliability tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run test

  # ─────────────────────────────────────────────
  # Stamp a unique version onto every build so it's obvious
  # which build a downloaded installer came from.
  # ─────────────────────────────────────────────
  version:
    name: Compute build version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          BASE=$(node -p "require('./src-tauri/tauri.conf.json').version")
          # Tauri requires strict 3-part semver (MAJOR.MINOR.PATCH); MSI/WiX
          # also accepts that shape. We keep MAJOR.MINOR from tauri.conf.json
          # and use the CI run number as PATCH so every build gets a unique,
          # monotonically increasing version that satisfies both.
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RAW="${GITHUB_REF#refs/tags/v}"
            OUT=$(echo "$RAW" | sed -E 's/[-+].*$//')
          else
            OUT="${MAJOR}.${MINOR}.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$OUT" >> "$GITHUB_OUTPUT"
          echo "Build version: $OUT"

  # ─────────────────────────────────────────────
  # Windows installer (.exe via NSIS) — Tauri
  #
  # We deliberately publish one installer technology. Shipping both MSI and
  # NSIS let users install two independent copies and an old Start-menu
  # shortcut could reopen the previous build after a successful update.
  # ─────────────────────────────────────────────
  windows:
    name: Windows (.exe)
    needs: [version, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: win-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Stamp version ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          node -e "
            const fs=require('fs');
            const p='src-tauri/tauri.conf.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            j.version='${{ needs.version.outputs.version }}';
            fs.writeFileSync(p, JSON.stringify(j,null,2));
            const cargo='src-tauri/Cargo.toml';
            const source=fs.readFileSync(cargo,'utf8');
            fs.writeFileSync(cargo, source.replace(/^(version\s*=\s*)\"[^\"]+\"/m, '\$1\"' + j.version + '\"'));
            console.log('Stamped native and bundle version', j.version);
          "

      - name: Install JS deps
        run: bun install

      - name: Build Tauri (Windows)
        run: bun run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartAccountant-Windows-${{ needs.version.outputs.version }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

      - name: Upload Windows build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: |
            src-tauri/target/release/build/**/output
            src-tauri/target/release/build/**/stderr
          if-no-files-found: ignore
          retention-days: 3

  # ─────────────────────────────────────────────
  # Android APK — Tauri v2 mobile
  # ─────────────────────────────────────────────
  android:
    name: Android (.apk)
    needs: [version, test]
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.0.12077973"
      NDK_HOME: ${{ github.workspace }}/android-sdk/ndk/27.0.12077973
      ANDROID_NDK_ROOT: ${{ github.workspace }}/android-sdk/ndk/27.0.12077973
    steps:
      - name: Free disk space on runner
        # The Android build (SDK + NDK + Rust targets + Gradle caches) easily
        # exceeds the ~14 GB free on a stock ubuntu-latest runner. Purge the
        # preinstalled toolchains we don't use to reclaim ~25 GB before we
        # start downloading Android bits.
        run: |
          echo "Before cleanup:" && df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc \
                      /usr/local/share/boost /usr/local/share/powershell \
                      /usr/local/lib/node_modules /opt/hostedtoolcache/CodeQL \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          docker image prune -af || true
          echo "After cleanup:" && df -h /

      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK + platform + build-tools
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}" "platforms;android-34" "build-tools;34.0.0"
          # Expose the resolved NDK path for later steps.
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: android-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Stamp version ${{ needs.version.outputs.version }}
        run: |
          node -e "
            const fs=require('fs');
            const p='src-tauri/tauri.conf.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            j.version='${{ needs.version.outputs.version }}';
            fs.writeFileSync(p, JSON.stringify(j,null,2));
            const cargo='src-tauri/Cargo.toml';
            const source=fs.readFileSync(cargo,'utf8');
            fs.writeFileSync(cargo, source.replace(/^(version\s*=\s*)\"[^\"]+\"/m, '\$1\"' + j.version + '\"'));
            console.log('Stamped native and bundle version', j.version);
          "

      - name: Install JS deps
        run: bun install

      - name: Init Tauri Android project (idempotent)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            bunx tauri android init
          else
            echo "Android project already initialized, skipping init."
          fi

      - name: Build Android APK (debug — auto-signed, installable)
        # We build --debug so the APK is auto-signed with Android's debug
        # keystore and installs on any phone without "App not installed".
        # Release builds produce an *-unsigned.apk that Android refuses to
        # install; a proper release keystore + GitHub secret is needed for
        # that path (Play Store distribution).
        run: bunx tauri android build --apk --debug

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartAccountant-Android-${{ needs.version.outputs.version }}
          # Only ship the universal debug APK — per-ABI splits would multiply
          # artifact size ~4x and blow the storage quota faster.
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

      - name: Upload Android build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: |
            src-tauri/gen/android/app/build/outputs/logs/**
            src-tauri/gen/android/app/build/reports/**
          if-no-files-found: ignore
          retention-days: 3

  # ─────────────────────────────────────────────
  # Print artifact download hint into the run summary
  # ─────────────────────────────────────────────
  summary:
    name: Build summary
    needs: [version, windows, android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          {
            echo "## Smart Accountant build ${{ needs.version.outputs.version }}"
            echo ""
            echo "- Windows: **${{ needs.windows.result }}**"
            echo "- Android: **${{ needs.android.result }}**"
            echo ""
            echo "Scroll to the **Artifacts** section at the bottom of this run to download \`SmartAccountant-Windows-${{ needs.version.outputs.version }}\` and \`SmartAccountant-Android\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────
  # On a version tag: publish a GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [version, windows, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Smart Accountant ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-artifacts/SmartAccountant-Windows-*/*
            dist-artifacts/SmartAccountant-Android/**/*
