name: Build Desktop & Mobile

# Run manually from the Actions tab, or automatically on version tags (v1.0.0 etc).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # ─────────────────────────────────────────────
  # Windows installer (.msi + .exe via NSIS) — Tauri
  # ─────────────────────────────────────────────
  windows:
    name: Windows (.msi + .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install JS deps
        run: bun install

      - name: Build Tauri (Windows)
        run: bun run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartAccountant-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Android APK — Tauri v2 mobile
  # ─────────────────────────────────────────────
  android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install JS deps
        run: bun install

      - name: Init Tauri Android project
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: bunx tauri android init

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: bunx tauri android build --apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartAccountant-Android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # On a version tag: publish a GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [windows, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Smart Accountant ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-artifacts/SmartAccountant-Windows/**/*
            dist-artifacts/SmartAccountant-Android/**/*
