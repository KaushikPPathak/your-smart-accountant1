name: Build Tauri (Windows)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      # 🛠️ Fix step: Direct path targeting ensures the crawler knows exactly where your route directory lives
      - name: Regenerate TanStack Routes Map
        run: bunx tsr generate --dir src/routes --out src/routeTree.gen.ts
        continue-on-error: true

      - name: Build embedded offline frontend
        run: bun run build:tauri
        env:
          TAURI_ENV_PLATFORM: windows
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: "-C debuginfo=0 -C codegen-units=1"

      - name: Verify embedded frontend entry
        run: bun run tauri:verify-dist

      - name: Build Tauri app (Windows installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: "-C debuginfo=0 -C codegen-units=1"
        with:
          # Added --debug flag dynamically here to preserve F12 inspect tools on your blank screen layout
          args: --debug --bundles nsis,msi

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smart-accountant-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
