name: Pure Manual Build

# This ensures the workflow ONLY runs when you explicitly command it
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Fetch the latest code from your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up the environment (Node.js environment)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Clean install your project dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Execute the production build command
      - name: Run Build
        run: npm run build
